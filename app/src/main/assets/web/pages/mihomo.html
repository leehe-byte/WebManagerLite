<div class="card-grid">
    <!-- 核心控制卡片 -->
    <div class="card">
        <div class="card-header">
            <h3>🛡️ Mihomo 核心控制</h3>
            <span id="mi-status-badge" class="status-badge" style="background: #eee; border-color: #ccc; color: #888;">检测中...</span>
        </div>
        <div class="card-body">
            <div class="operator-line" style="margin-bottom: 20px;">
                <div class="op-brand">
                    <h2 id="mi-running-text" style="font-size: 16px;">内核未运行</h2>
                </div>
                <div class="ios-switch">
                    <input type="checkbox" id="mi-toggle">
                    <label for="mi-toggle" class="ios-slider"></label>
                </div>
            </div>
            
            <div class="flex-between" style="padding: 10px 0; border-top: 1px solid var(--border-color);">
                <div>
                    <label style="font-size: 14px; font-weight: 500;">开机自动启动</label>
                    <div class="input-desc">系统重启后自动运行内核</div>
                </div>
                <div class="ios-switch">
                    <input type="checkbox" id="mi-boot-toggle" onchange="MihomoModule.toggleBoot(this.checked)">
                    <label for="mi-boot-toggle" class="ios-slider"></label>
                </div>
            </div>

            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button onclick="MihomoModule.action('restart')" class="btn-secondary" style="flex:1; font-size: 12px;">重启内核</button>
                <button onclick="MihomoModule.editRawConfig()" class="btn-secondary" style="flex:1; font-size: 12px;">编辑 config.yaml</button>
                <button onclick="MihomoModule.openDashboard()" class="btn-primary" style="flex:1; font-size: 12px;">控制面板</button>
            </div>
        </div>
    </div>

    <!-- 基础配置卡片 -->
    <div class="card">
        <div class="card-header">
            <h3>⚙️ 基础配置</h3>
            <button onclick="MihomoModule.saveSettings()" class="badge" style="cursor:pointer; background:var(--primary); color:#fff; border:none; padding:4px 12px;">保存设置</button>
        </div>
        <div class="card-body">
            <table class="info-table">
                <tr><td>运行模式</td><td><span id="mi-mode">--</span> <span class="badge" style="cursor:pointer;" onclick="MihomoModule.showModePicker()">✏️</span></td></tr>
                <tr><td>混合端口</td><td id="mi-port">--</td></tr>
                <tr><td>日志级别</td><td><span id="mi-log-level">--</span> <span class="badge" style="cursor:pointer;" onclick="MihomoModule.showLogLevelPicker()">✏️</span></td></tr>
                <tr><td>TUN 设备</td><td id="mi-tun" style="color:var(--primary); font-weight:bold;">--</td></tr>
                <tr><td>External-UI</td>
                    <td style="display:flex; gap:6px; justify-content:flex-end; align-items:center;">
                        <span id="mi-external-ui">--</span>
                        <span class="badge" style="cursor:pointer;" onclick="MihomoModule.showUIPicker()">✏️</span>
                    </td>
                </tr>
                <tr><td>Secret</td>
                    <td style="display:flex; gap:6px; justify-content:flex-end; align-items:center;">
                        <input id="mi-secret-input" type="text" style="width:120px; padding:4px 8px; border:1px solid var(--border-color); border-radius:4px; font-size:12px; background:var(--bg); color:var(--text-main); text-align:right;" placeholder="留空则不设置">
                    </td>
                </tr>
                <tr><td>控制端口</td>
                    <td style="display:flex; gap:6px; justify-content:flex-end; align-items:center;">
                        <input id="mi-controller-input" type="text" style="width:160px; padding:4px 8px; border:1px solid var(--border-color); border-radius:4px; font-size:12px; background:var(--bg); color:var(--text-main); text-align:right;" placeholder="如 0.0.0.0:9090">
                    </td>
                </tr>
            </table>
        </div>
    </div>
</div>

<!-- User-Agent 配置 -->
<div class="card">
    <div class="card-header">
        <h3>🌐 User-Agent 列表</h3>
        <div style="display:flex; gap:6px;">
            <button onclick="MihomoModule.addUA()" class="badge" style="cursor:pointer; background:var(--primary); color:#fff; border:none; padding:4px 10px;">+ 添加</button>
            <button onclick="MihomoModule.saveUA()" class="badge" style="cursor:pointer; background:var(--success); color:#fff; border:none; padding:4px 10px;">保存</button>
        </div>
    </div>
    <div class="card-body">
        <div id="mi-ua-list">
            <!-- 由 JS 动态渲染 -->
        </div>
        <div class="input-desc" style="margin-top:8px;">💡 列表中的第一个 UA 将作为默认值，用于所有订阅请求</div>
    </div>
</div>

<!-- 订阅管理 -->
<div class="card">
    <div class="card-header">
        <h3>📡 订阅管理 (proxy-providers)</h3>
        <div style="display:flex; gap:6px;">
            <button onclick="MihomoModule.showAddSubDialog()" class="badge" style="cursor:pointer; background:var(--primary); color:#fff; border:none; padding:4px 10px;">+ 新增订阅</button>
            <button onclick="MihomoModule.updateAllSubs()" class="badge" style="cursor:pointer; background:var(--warning); color:#fff; border:none; padding:4px 10px;">全部更新</button>
        </div>
    </div>
    <div class="card-body">
        <div id="mi-sub-list">
            <div style="text-align:center; padding:30px; color:var(--text-sub);">加载中...</div>
        </div>
    </div>
</div>

<!-- 系统日志 -->
<div class="card">
    <div class="card-header">
        <h3>📋 系统日志</h3>
        <div style="display:flex; gap:8px; align-items:center;">
            <label style="font-size:12px; color:var(--text-sub); cursor:pointer;">
                <input type="checkbox" id="mi-log-auto-refresh" checked onchange="MihomoModule.toggleLogAutoRefresh()"> 自动刷新
            </label>
            <button onclick="MihomoModule.loadLog()" class="badge" style="cursor:pointer; border:none; padding:4px 10px;">刷新</button>
        </div>
    </div>
    <div class="card-body">
        <pre id="mi-log-area" class="log-area" style="height: 250px; background: #000; color: #00ff00; font-size: 11px; overflow-y: auto; padding: 10px; border-radius: 4px;"></pre>
    </div>
</div>

<!-- WebUI 嵌套 -->
<div id="mi-dashboard-wrap" class="card" style="display: none; padding: 0; overflow: hidden; border: 2px solid var(--primary);">
    <div class="card-header" style="padding: 10px 15px; background: var(--card-bg);">
        <h3>📊 外部控制面板</h3>
        <button onclick="document.getElementById('mi-dashboard-wrap').style.display='none'" class="btn-logout" style="padding: 2px 8px;">关闭面板</button>
    </div>
    <iframe id="mi-iframe" src="" style="width: 100%; height: 650px; border: none;"></iframe>
</div>
