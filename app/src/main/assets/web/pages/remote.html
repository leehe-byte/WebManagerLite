<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>远程控制 - BridgeLink</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/remote.css">
</head>
<body class="embedded-page">
    <div class="remote-container">
        <div class="remote-header">
            <h2>📱 远程控制 (高性能模式)</h2>
            
            <div class="remote-toolbar">
                <div class="remote-config" style="background: rgba(0,0,0,0.1); padding: 5px 10px; border-radius: 4px; font-family: monospace;">
                    <span id="remote-target-info">...</span>
                </div>
                
                <button id="remote-connect-btn" class="btn btn-primary">
                    <span class="btn-text">连接</span>
                </button>
                <button id="remote-disconnect-btn" class="btn btn-danger" style="display: none;">
                    断开
                </button>
            </div>
            
            <div class="remote-status">
                <div class="remote-status-badge">
                    <span id="remote-status-dot" class="remote-status-dot"></span>
                    <span id="remote-status-text">未连接</span>
                </div>
                <span id="remote-fps" class="remote-fps">-- FPS</span>
            </div>
        </div>
        
        <div class="remote-video-wrapper" id="remote-video-wrapper">
            <canvas id="remote-canvas" style="display: none;"></canvas>
            <div class="remote-placeholder" id="remote-placeholder">
                <span class="remote-placeholder-icon">📱</span>
                <p>点击「连接」开始投屏</p>
                <p class="hint">系统将自动连接后端 Scrcpy 服务</p>
            </div>
        </div>
        
        <div class="remote-controls">
            <button id="remote-back-btn" class="btn btn-secondary" disabled>◀ 返回</button>
            <button id="remote-home-btn" class="btn btn-secondary" disabled>● Home</button>
            <button id="remote-recents-btn" class="btn btn-secondary" disabled>▢ 多任务</button>
            <span class="divider"></span>
            <button id="remote-fullscreen-btn" class="btn btn-secondary" disabled>⛶ 全屏</button>
        </div>
        
        <div id="remote-error" class="remote-error" style="display: none; background: #fee; color: #c00; padding: 10px; margin: 10px; border-radius: 4px; border: 1px solid #fcc;"></div>
    </div>
</body>
</html>
