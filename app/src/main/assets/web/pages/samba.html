<div class="card">
    <div class="card-header">
        <div style="display: flex; align-items: center; gap: 10px;">
            <div style="background: linear-gradient(135deg, #1890ff 0%, #096dd9 100%); width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 18px;">📂</div>
            <h3 style="margin: 0;">Samba 共享</h3>
        </div>
    </div>
    <div class="card-body">
        <div class="info-table">
            <div class="flex-between" style="padding: 12px 0;">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <span style="font-size: 20px;">🖥️</span>
                    <div style="display: flex; flex-direction: column;">
                        <span style="font-size: 14px; font-weight: 500;">Samba 服务</span>
                        <span id="samba-status-text" style="font-size: 11px; color: var(--text-sub);">正在获取状态...</span>
                    </div>
                </div>
                <div class="ios-switch">
                    <input type="checkbox" id="samba-switch">
                    <label for="samba-switch" class="ios-slider"></label>
                </div>
            </div>
            <div style="margin-top: 10px; padding: 12px; background: #fffbe6; border: 1px solid #ffe58f; border-radius: 6px; font-size: 12px; color: #856404;">
                提示：开启 Samba 后，您可以在局域网内通过 \\192.168.0.1 访问设备存储。
            </div>
        </div>
    </div>
</div>
