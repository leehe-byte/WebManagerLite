<div class="card">
    <div class="card-header">
        <div style="display: flex; align-items: center; gap: 10px;">
            <div style="background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 18px;">📂</div>
            <h3 style="margin: 0;">Samba 共享</h3>
        </div>
    </div>
    <div class="card-body">
        <!-- 服务开关 -->
        <div class="flex-between" style="padding: 12px 0; border-bottom: 1px solid var(--border);">
            <div style="display: flex; align-items: center; gap: 12px;">
                <span style="font-size: 20px;">🖥️</span>
                <div style="display: flex; flex-direction: column;">
                    <span style="font-size: 14px; font-weight: 500;">Samba 服务</span>
                    <span id="samba-status-text" style="font-size: 11px; color: var(--text-sub);">正在获取状态...</span>
                </div>
            </div>
            <div class="ios-switch">
                <input type="checkbox" id="samba-switch">
                <label for="samba-switch" class="ios-slider"></label>
            </div>
        </div>

        <!-- 访问地址提示 -->
        <div id="samba-address-bar" style="display: none; margin-top: 10px; padding: 10px 14px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;">
            <div style="display: flex; align-items: center; gap: 8px;">
                <span style="font-size: 14px;">🔗</span>
                <span style="font-size: 12px; color: var(--text-sub);">访问地址：</span>
                <span id="samba-address-text" style="font-size: 13px; font-weight: 600; color: var(--primary); font-family: monospace;"></span>
            </div>
        </div>

        <!-- 共享列表标题 -->
        <div style="display: flex; align-items: center; justify-content: space-between; margin-top: 16px; margin-bottom: 10px;">
            <span style="font-size: 14px; font-weight: 600; color: var(--text);">📁 共享目录</span>
            <button id="samba-add-share-btn" class="btn btn-sm btn-primary" style="display: none;">+ 新增共享</button>
        </div>

        <!-- 共享列表 -->
        <div id="samba-share-list" style="display: none;">
            <!-- 由 JS 动态渲染 -->
        </div>

        <div id="samba-empty-hint" style="margin-top: 10px; padding: 20px; text-align: center; color: var(--text-sub); font-size: 13px; border: 1px dashed var(--border); border-radius: 8px; display: none;">
            📂 暂无共享目录，点击上方「+ 新增共享」添加
        </div>

        <!-- 新增共享弹窗 -->
        <div id="samba-add-modal" class="modal-overlay" style="display: none;">
            <div class="modal-content" style="max-width: 420px;">
                <div class="modal-header">
                    <span style="font-size: 16px; font-weight: 600;">新增共享目录</span>
                    <button class="modal-close" onclick="document.getElementById('samba-add-modal').style.display='none'">✕</button>
                </div>
                <div class="modal-body" style="padding: 16px 0;">
                    <div class="form-group">
                        <label class="form-label">共享名称</label>
                        <input id="samba-new-name" class="form-input" type="text" placeholder="例如: Shared" value="Shared">
                    </div>
                    <div class="form-group">
                        <label class="form-label">路径</label>
                        <input id="samba-new-path" class="form-input" type="text" placeholder="例如: /sdcard/DCIM" value="/sdcard">
                    </div>
                    <div class="form-group">
                        <label class="form-label">描述（可选）</label>
                        <input id="samba-new-comment" class="form-input" type="text" placeholder="例如: 我的共享" value="Android Shared">
                    </div>
                </div>
                <div class="modal-footer" style="display: flex; gap: 8px; justify-content: flex-end;">
                    <button class="btn btn-sm btn-secondary" onclick="document.getElementById('samba-add-modal').style.display='none'">取消</button>
                    <button id="samba-confirm-add-btn" class="btn btn-sm btn-primary">添加</button>
                </div>
            </div>
        </div>

        <!-- 编辑共享弹窗 -->
        <div id="samba-edit-modal" class="modal-overlay" style="display: none;">
            <div class="modal-content" style="max-width: 420px;">
                <div class="modal-header">
                    <span style="font-size: 16px; font-weight: 600;">编辑共享</span>
                    <button class="modal-close" onclick="document.getElementById('samba-edit-modal').style.display='none'">✕</button>
                </div>
                <div class="modal-body" style="padding: 16px 0;">
                    <input id="samba-edit-original-name" type="hidden">
                    <div class="form-group">
                        <label class="form-label">共享名称</label>
                        <input id="samba-edit-name" class="form-input" type="text">
                    </div>
                    <div class="form-group">
                        <label class="form-label">路径</label>
                        <input id="samba-edit-path" class="form-input" type="text">
                    </div>
                    <div class="form-group">
                        <label class="form-label">描述</label>
                        <input id="samba-edit-comment" class="form-input" type="text">
                    </div>
                    <div class="form-group">
                        <label class="form-label">权限</label>
                        <div style="display: flex; gap: 16px; margin-top: 4px;">
                            <label style="display: flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer;">
                                <input type="checkbox" id="samba-edit-writable" checked> 可写入
                            </label>
                            <label style="display: flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer;">
                                <input type="checkbox" id="samba-edit-browseable" checked> 可浏览
                            </label>
                            <label style="display: flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer;">
                                <input type="checkbox" id="samba-edit-public" checked> 公开
                            </label>
                        </div>
                    </div>
                </div>
                <div class="modal-footer" style="display: flex; gap: 8px; justify-content: flex-end;">
                    <button class="btn btn-sm btn-secondary" onclick="document.getElementById('samba-edit-modal').style.display='none'">取消</button>
                    <button id="samba-confirm-edit-btn" class="btn btn-sm btn-primary">保存</button>
                </div>
            </div>
        </div>

        <!-- 提示信息 -->
        <div style="margin-top: 12px; padding: 10px 14px; background: #fffbe6; border: 1px solid #ffe58f; border-radius: 8px; font-size: 12px; color: #856404;">
            💡 提示：Samba 共享基于系统 smbd 服务，修改配置后需重启服务生效。
        </div>
    </div>
</div>
