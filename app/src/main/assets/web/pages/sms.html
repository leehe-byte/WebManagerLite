<div class="card sms-container-card">
    <!-- 短信列表视图 -->
    <div id="sms-list-view">
        <div class="card-header">
            <div style="display: flex; align-items: center; gap: 10px;">
                <div style="background: var(--primary); width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 18px;">✉️</div>
                <h3 style="margin: 0;">短信会话</h3>
            </div>
            <span id="sms-total-count" class="badge">0 个会话</span>
        </div>
        <div id="sms-threads-container" class="sms-threads-list">
            <p style="text-align: center; color: #999; padding: 40px;">正在加载短信会话...</p>
        </div>
    </div>

    <!-- 短信详情视图 (默认隐藏) -->
    <div id="sms-detail-view" style="display: none;">
        <div class="card-header" style="position: sticky; top: 0; background: var(--bg-card); z-index: 10; border-bottom: 1px solid var(--border-color); padding-bottom: 15px;">
            <div style="display: flex; align-items: center; gap: 12px;">
                <button onclick="SmsModule.backToList()" class="btn-back" style="background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-main); padding: 0 10px 0 0;">←</button>
                <div>
                    <h3 id="detail-number" style="margin: 0; font-size: 16px;">--</h3>
                    <span id="detail-count" style="font-size: 11px; color: var(--text-sub);">正在加载历史记录...</span>
                </div>
            </div>
        </div>
        
        <!-- 聊天气泡流容器 -->
        <div id="chat-flow-container" class="chat-flow"></div>

        <div class="detail-footer" style="padding: 15px 0 5px 0; text-align: center;">
            <button onclick="SmsModule.backToList()" class="btn-primary" style="width: 120px; border-radius: 20px; font-size: 13px;">返回列表</button>
        </div>
    </div>
</div>

<style>
.sms-threads-list { margin-top: 15px; display: flex; flex-direction: column; }
.sms-thread-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid var(--border-color); cursor: pointer; transition: background 0.2s; position: relative; }
.sms-thread-item:active { background: rgba(0,0,0,0.05); }
.sms-thread-avatar { width: 42px; height: 42px; background: #f0f2f5; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; margin-right: 12px; flex-shrink: 0; }
.sms-thread-main { flex: 1; min-width: 0; }
.sms-thread-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.sms-thread-number { font-weight: 600; color: var(--text-main); font-size: 14px; }
.sms-thread-time { font-size: 11px; color: var(--text-sub); }
.sms-thread-snippet { font-size: 13px; color: var(--text-sub); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.unread-dot { width: 8px; height: 8px; background: #ff4d4f; border-radius: 50%; position: absolute; left: 6px; top: 15px; }

/* 聊天详情样式 */
.chat-flow { height: 60vh; overflow-y: auto; padding: 15px 5px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
.chat-bubble-wrap { display: flex; flex-direction: column; align-items: flex-start; max-width: 90%; }
.chat-bubble { background: #f0f2f5; padding: 12px 15px; border-radius: 18px 18px 18px 4px; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
[data-theme="dark"] .chat-bubble { background: #2f3336; }
.chat-content { font-size: 14px; line-height: 1.5; color: var(--text-main); word-break: break-all; }
.chat-time { font-size: 10px; color: var(--text-sub); margin-top: 5px; }

/* 验证码样式 */
.otp-card { margin-top: 8px; padding: 8px 12px; background: rgba(24,144,255,0.1); border: 1px dashed var(--primary); border-radius: 8px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.otp-val { font-family: monospace; font-weight: bold; color: var(--primary); font-size: 15px; letter-spacing: 1px; }
.btn-copy-sm { border: none; background: var(--primary); color: #fff; padding: 4px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; }
</style>
