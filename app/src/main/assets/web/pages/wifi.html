<div id="wifi-settings">
    <div class="card">
        <div class="card-header">
            <h3>📡 WiFi 基础设置</h3>
            <span id="wifi-global-status" class="status-badge">正在获取...</span>
        </div>
        
        <div class="form-group">
            <label>WiFi 运行模式</label>
            <!-- 改为自定义选择器触发器 -->
            <div id="wifi-mode-picker-btn" class="modern-input picker-trigger" style="width: 100%; margin-top: 5px; padding: 10px 32px 10px 12px; font-size: 13px; cursor: pointer; text-align: left; background-color: #fff;" onclick="WifiModule.showModePicker()">
                正在获取...
            </div>
            <p class="input-desc">注：2.4G 与 5G 互斥，同一时间只能开启一个频段。</p>
        </div>

        <hr style="border: none; border-top: 1px solid #eee; margin: 20px 0;">

        <div id="wifi-config-fields">
            <div class="form-group">
                <label>网络名称 (SSID)</label>
                <input type="text" id="wifi-ssid" class="modern-input">
            </div>
            <div class="flex-between form-group">
                <label>广播网络名称</label>
                <div class="ios-switch">
                    <input type="checkbox" id="wifi-broadcast">
                    <label for="wifi-broadcast" class="ios-slider"></label>
                </div>
            </div>
            <div class="form-group">
                <label>安全加密模式</label>
                <!-- 改为自定义选择器触发器 -->
                <div id="wifi-auth-picker-btn" class="modern-input picker-trigger" style="width: 100%; margin-top: 5px; padding: 10px 32px 10px 12px; font-size: 13px; cursor: pointer; text-align: left; background-color: #fff;" onclick="WifiModule.showAuthPicker()">
                    正在获取...
                </div>
            </div>
            <div class="form-group">
                <label>无线密码</label>
                <div class="value-box">
                    <input type="password" id="wifi-password" class="modern-input" style="border:none; background:transparent; margin-top:0; flex:1;">
                    <i class="eye-toggle" onclick="WifiModule.togglePass()">🔒</i>
                </div>
            </div>
            <div class="form-group">
                <label>最大接入数</label>
                <input type="number" id="wifi-max-station" class="modern-input" min="1" max="32">
            </div>
        </div>
    </div>

    <div style="margin-bottom: 30px;">
        <button id="wifi-save-btn" onclick="WifiModule.save()" class="btn-primary" style="width: 100%; height: 45px; font-size: 15px;">保存 WiFi 修改</button>
    </div>
</div>
